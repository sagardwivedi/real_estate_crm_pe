<div class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-lg hover:shadow-xl transition-shadow duration-300 border border-gray-100 dark:border-gray-700">
    {% if icon %}
    <div class="w-16 h-16 bg-primary-50 dark:bg-primary-900/20 rounded-xl flex items-center justify-center mb-6">
        <img src="{{ icon }}" alt="Icon" class="w-10 h-10 text-primary-600">
    </div>
    {% endif %}
    <h3 class="text-xl font-semibold text-gray-900 dark:text-white mb-4">{{ title }}</h3>
    <p class="text-gray-600 dark:text-gray-400">{{ content }}</p>
</div>
