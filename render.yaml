databases:
  - name: realestate_crm_db
    plan: free
    databaseName: realestate_crm
    user: root

services:
  - type: web
    plan: free
    name: realestate_crm
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn realestate_crm.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: realestate_crm_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
