{% extends 'base.html' %}

{% block title %}Security - Real Estate CRM{% endblock %}

{% block content %}
<div class="flex h-screen bg-gray-100 dark:bg-gray-900">
    <!-- Navbar Sidebar -->
    {% include "_sidebar.html" %}
    
    <!-- Settings Sidebar -->
    {% include "_settings_sidebar.html" %}
    
    <!-- Main Content -->
    <main class="flex-1 p-6">
        <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Security Settings</h1>

        <form method="POST" class="mt-6">
            {% csrf_token %}
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-200">New Password</label>
                <input type="password" name="password" id="password" class="mt-1 p-2 w-full border rounded-md" />
            </div>

            <div class="mt-6 flex justify-end">
                <button type="submit" class="px-6 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-md">Save Changes</button>
            </div>
        </form>
    </main>
</div>
{% endblock %}
