{% extends 'base.html' %}

{% block title %}
  Subscription - Real Estate CRM
{% endblock %}

{% block content %}
  <div class="flex h-screen bg-gray-100 dark:bg-gray-900">
    <!-- Navbar Sidebar -->
    {% include '_sidebar.html' %}

    <!-- Settings Sidebar -->
    {% include '_settings_sidebar.html' %}

    <!-- Main Content -->
    <main class="flex-1 p-6">
      <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Subscription</h1>

      <p class="mt-4">Current Plan: {{ subscription }}</p>

      <div class="mt-6 flex justify-end">
        <button class="px-6 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-md">Upgrade Plan</button>
      </div>
    </main>
  </div>
{% endblock %}
