{% load active_link %}

<aside class="w-64 bg-white dark:bg-gray-800 p-6 shadow-lg flex flex-col justify-between border-r border-gray-200 dark:border-gray-700">
  <!-- Logo and Navigation -->
  <div>
    <!-- Sidebar Header -->
    <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-8"><a href="{% url 'dashboard' name=request.user.company.name %}" class="hover:text-primary-600 dark:hover:text-primary-400 transition-colors"><span class="text-primary-600 dark:text-primary-400">RE</span>CRM</a></h2>

    <!-- Navigation Links -->
    <nav>
      <ul class="space-y-2">
        <!-- Dashboard -->
        <li>
          <a href="{% url 'dashboard' name=request.user.company.name %}" class="flex items-center px-4 py-2.5 rounded-lg transition-all duration-200 
                        {% active_link 'dashboard' 'bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 font-semibold' 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700' %}">
            <span class="w-6 h-6 flex items-center justify-center">🏠</span>
            <span class="ml-3">Dashboard</span>
          </a>
        </li>

        <!-- Leads -->
        <li>
          <a href="{% url 'leads:lead_list' name=request.user.company.name %}" class="flex items-center px-4 py-2.5 rounded-lg transition-all duration-200 
                        {% active_link 'leads:lead_list' 'bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 font-semibold' 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700' %}">
            <span class="w-6 h-6 flex items-center justify-center">📋</span>
            <span class="ml-3">Leads</span>
          </a>
        </li>

        <!-- Properties -->
        <li>
          <a href="{% url 'properties:property_list' name=request.user.company.name %}" class="flex items-center px-4 py-2.5 rounded-lg transition-all duration-200 
                        {% active_link 'properties:property_list' 'bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 font-semibold' 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700' %}">
            <span class="w-6 h-6 flex items-center justify-center">🏢</span>
            <span class="ml-3">Properties</span>
          </a>
        </li>

        <!-- Reports -->
        <li>
          <a href="{% url 'reports:dashboard' name=request.user.company.name %}" class="flex items-center px-4 py-2.5 rounded-lg transition-all duration-200 
                        {% active_link 'reports:dashboard' 'bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 font-semibold' 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700' %}">
            <span class="w-6 h-6 flex items-center justify-center">📊</span>
            <span class="ml-3">Reports</span>
          </a>
        </li>

        <!-- Settings -->
        <li>
          <a href="{% url 'company_settings:company_view' name=request.user.company.name %}" class="flex items-center px-4 py-2.5 rounded-lg transition-all duration-200 
                        {% active_link 'company_settings:company_view || company_settings:user_management || company_settings:subscription' 'bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 font-semibold' 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700' %}">
            <span class="w-6 h-6 flex items-center justify-center">⚙️</span>
            <span class="ml-3">Settings</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <!-- Logout Button -->
  <form method="POST" action="{% url 'users:logout' %}" class="mt-6">
    {% csrf_token %}
    <button type="submit" class="w-full flex items-center px-4 py-2.5 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors duration-200">
      <span class="w-6 h-6 flex items-center justify-center">🚪</span>
      <span class="ml-3">Logout</span>
    </button>
  </form>
</aside>
