{% load tailwind_cli %}
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}

      {% endblock %}
    </title>
    <script>
      ;(function () {
        let theme = localStorage.getItem('theme') || 'light'
        document.documentElement.classList.add(theme)
      })()
    </script>
    {% tailwind_css %}
    {% block extra_head %}

    {% endblock %}
  </head>

  <body class="min-h-screen bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-800 dark:text-gray-100">
    {% block content %}

    {% endblock %}
    {% block extra_body %}

    {% endblock %}
  </body>
</html>
